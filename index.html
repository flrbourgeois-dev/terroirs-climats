<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="utf-8">
    <title>Terroirs & Climats — Dashboard</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta http-equiv="cache-control" content="no-cache">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: #1a1a2e;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-box {
            background: #16213e;
            border-radius: 12px;
            padding: 48px 40px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 400px;
        }
        .login-box h1 {
            color: #f0f0f0;
            font-size: 1.4rem;
            font-weight: 600;
            margin-bottom: 8px;
            text-align: center;
        }
        .login-box p {
            color: #aaa;
            font-size: 0.9rem;
            text-align: center;
            margin-bottom: 24px;
        }
        .login-box input[type="password"] {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid #333;
            border-radius: 6px;
            background: #0f1a2e;
            color: #f0f0f0;
            font-size: 1rem;
            font-family: 'Inter', sans-serif;
            outline: none;
            transition: border-color 0.2s;
        }
        .login-box input[type="password"]:focus {
            border-color: #722f37;
        }
        .login-box button {
            width: 100%;
            padding: 12px;
            margin-top: 16px;
            background: #722f37;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            font-family: 'Inter', sans-serif;
            transition: background 0.2s;
        }
        .login-box button:hover { background: #8b3a42; }
        .login-box button:disabled { background: #555; cursor: wait; }
        .remember-row {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-top: 12px;
        }
        .remember-row label { color: #aaa; font-size: 0.85rem; }
        .error-msg {
            color: #e74c3c;
            font-size: 0.85rem;
            text-align: center;
            margin-top: 12px;
            display: none;
        }
        .spinner {
            display: none;
            margin: 12px auto 0;
            width: 24px; height: 24px;
            border: 3px solid #333;
            border-top-color: #722f37;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="login-box">
        <h1>Terroirs & Climats</h1>
        <p>Entrez le mot de passe pour accéder au dashboard.</p>
        <form id="decrypt-form">
            <input type="password" id="password" placeholder="Mot de passe" autocomplete="current-password">
            <div class="remember-row">
                <input type="checkbox" id="remember" checked>
                <label for="remember">Se souvenir de moi (30 jours)</label>
            </div>
            <button type="submit" id="btn">Accéder</button>
            <div class="spinner" id="spinner"></div>
            <div class="error-msg" id="error">Mot de passe incorrect.</div>
        </form>
    </div>

    const REMEMBER_KEY = "terroirs_climats_key";
    const REMEMBER_EXP_KEY = "terroirs_climats_exp";
    const REMEMBER_DAYS = 30;

    async function deriveKey(password, salt) {
        const enc = new TextEncoder();
        const keyMaterial = await crypto.subtle.importKey(
            "raw", enc.encode(password), "PBKDF2", false, ["deriveBits"]
        );
        const keyBytes = await crypto.subtle.deriveBits(
            { name: "PBKDF2", salt: salt, iterations: 100000, hash: "SHA-256" },
            keyMaterial, 256
        );
        return crypto.subtle.importKey("raw", keyBytes, { name: "AES-GCM" }, false, ["decrypt"]);
    }

    async function decrypt(password) {
        try {
            const combined = Uint8Array.from(atob(ENCRYPTED_DATA), c => c.charCodeAt(0));
            const salt = combined.slice(0, 16);
            const iv = combined.slice(16, 28);
            const authTag = combined.slice(28, 44);
            const ciphertext = combined.slice(44);

            // Combine ciphertext + authTag for Web Crypto (GCM expects tag appended)
            const dataWithTag = new Uint8Array(ciphertext.length + authTag.length);
            dataWithTag.set(ciphertext);
            dataWithTag.set(authTag, ciphertext.length);

            const key = await deriveKey(password, salt);
            const decrypted = await crypto.subtle.decrypt(
                { name: "AES-GCM", iv: iv },
                key, dataWithTag
            );
            return new TextDecoder().decode(decrypted);
        } catch (e) {
            return null;
        }
    }

    async function handleSubmit(password, remember) {
        const btn = document.getElementById("btn");
        const spinner = document.getElementById("spinner");
        const error = document.getElementById("error");

        btn.disabled = true;
        spinner.style.display = "block";
        error.style.display = "none";

        const plainHTML = await decrypt(password);

        if (plainHTML) {
            if (remember) {
                // Store a derived hash for remember-me (not the password itself)
                const combined = Uint8Array.from(atob(ENCRYPTED_DATA), c => c.charCodeAt(0));
                const salt = combined.slice(0, 16);
                const enc = new TextEncoder();
                const keyMaterial = await crypto.subtle.importKey(
                    "raw", enc.encode(password), "PBKDF2", false, ["deriveBits"]
                );
                const keyBytes = await crypto.subtle.deriveBits(
                    { name: "PBKDF2", salt: salt, iterations: 100000, hash: "SHA-256" },
                    keyMaterial, 256
                );
                const keyHex = Array.from(new Uint8Array(keyBytes)).map(b => b.toString(16).padStart(2,'0')).join('');
                localStorage.setItem(REMEMBER_KEY, keyHex);
                const exp = Date.now() + REMEMBER_DAYS * 86400000;
                localStorage.setItem(REMEMBER_EXP_KEY, exp.toString());
            }
            document.open();
            document.write(plainHTML);
            document.close();
        } else {
            btn.disabled = false;
            spinner.style.display = "none";
            error.style.display = "block";
        }
    }

    async function tryRememberMe() {
        const exp = localStorage.getItem(REMEMBER_EXP_KEY);
        const keyHex = localStorage.getItem(REMEMBER_KEY);
        if (!keyHex || !exp || Date.now() > parseInt(exp)) {
            localStorage.removeItem(REMEMBER_KEY);
            localStorage.removeItem(REMEMBER_EXP_KEY);
            return false;
        }
        try {
            const combined = Uint8Array.from(atob(ENCRYPTED_DATA), c => c.charCodeAt(0));
            const iv = combined.slice(16, 28);
            const authTag = combined.slice(28, 44);
            const ciphertext = combined.slice(44);
            const dataWithTag = new Uint8Array(ciphertext.length + authTag.length);
            dataWithTag.set(ciphertext);
            dataWithTag.set(authTag, ciphertext.length);

            const keyBytes = new Uint8Array(keyHex.match(/.{2}/g).map(b => parseInt(b, 16)));
            const key = await crypto.subtle.importKey("raw", keyBytes, { name: "AES-GCM" }, false, ["decrypt"]);
            const decrypted = await crypto.subtle.decrypt({ name: "AES-GCM", iv: iv }, key, dataWithTag);
            const plainHTML = new TextDecoder().decode(decrypted);
            document.open();
            document.write(plainHTML);
            document.close();
            return true;
        } catch (e) {
            localStorage.removeItem(REMEMBER_KEY);
            localStorage.removeItem(REMEMBER_EXP_KEY);
            return false;
        }
    }

    // On load: try remember-me first
    (async () => {
        if (await tryRememberMe()) return;
    })();

    document.getElementById("decrypt-form").addEventListener("submit", async (e) => {
        e.preventDefault();
        const password = document.getElementById("password").value;
        const remember = document.getElementById("remember").checked;
        await handleSubmit(password, remember);
    });
